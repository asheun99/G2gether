<!-- search.html -->
<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/">
<div th:fragment="searchCondition(view)">
	<!-- 검색조건 토글 버튼 -->
	<button type="button" class="btn btn-outline-secondary mb-2"
		id="btnToggleSearch" data-bs-toggle="collapse"
		data-bs-target="#searchConditionWrapper">검색조건 열기</button>

	<!-- 검색조건 전체 wrapper (기본 닫힘) -->
	<form id="issueFilterForm" th:action="@{/searchList}" method="get">
		<input type="hidden" name="view" th:value="${view}" />
		<div id="searchConditionWrapper" class="collapse">
			<div class="search-filters mb-3 mt-3">
				<div class="row g-2 align-items-end">
					<!-- 프로젝트 -->
					<div class="col-12 col-md-3">
						<label class="form-label">프로젝트</label>
						<div class="input-group">
							<input type="text" id="filterProjectText" class="form-control"
								placeholder="프로젝트 선택" readonly th:value="${projectName}" /> <input
								type="hidden" id="filterProjectValue" name="projectCode"
								th:value="${projectCode}" />
							<button type="button" class="btn btn-secondary"
								id="btnOpenProjectModal">선택</button>
						</div>
					</div>

					<!-- 프로젝트 상태 -->
					<div class="col-12 col-md-3 filter-select-wide">
						<label class="form-label">프로젝트 상태</label> <select
							id="filterProjectStatus" name="projectStatusName"
							class="form-select">

							<!-- 관리자일 때 -->
							<th:block th:if="${isAdmin}">
								<option value=""
									th:selected="${param.projectStatus == null or param.projectStatus == ''}">전체</option>
								<option value="OD1"
									th:selected="${param.projectStatus == null or param.projectStatus == 'OD1'}">진행</option>
								<option value="OD3"
									th:selected="${param.projectStatus == 'OD3'}">종료</option>
							</th:block>

							<!-- 개발자일 때 -->
							<th:block th:unless="${isAdmin}">
								<option value="OD1" selected>진행</option>
							</th:block>
						</select>
					</div>

					<!-- 유형 -->
					<div class="col-12 col-md-3">
						<label class="form-label">유형</label>
						<div class="input-group">
							<input type="text" id="filterTypeText" class="form-control"
								placeholder="유형 선택" readonly th:value="${typeLabel}" /> <input
								type="hidden" id="filterTypeValue" name="typeCode"
								th:value="${param.typeCode}" />
							<button type="button" class="btn btn-secondary"
								id="btnOpenTypeModal">선택</button>
						</div>
					</div>

					<!-- 일감명 -->
					<div class="col-12 col-md-3">
						<label class="form-label">일감명</label> <input type="text"
							id="filterTitle" name="title" class="form-control"
							placeholder="일감명 입력" th:value="${param.title}" />
					</div>
				</div>

				<div class="row g-2 align-items-end mt-1">
					<!-- 일감 상태 -->
					<div class="col-12 col-md-2">
						<label class="form-label">일감 상태</label> <select id="filterStatus"
							name="statusId" class="form-select">
							<option value=""
								th:selected="${param.statusId == null or param.statusId == ''}">전체</option>
							<option value="OB1" th:selected="${param.statusId == 'OB1'}">신규</option>
							<option value="OB2" th:selected="${param.statusId == 'OB2'}">진행</option>
							<option value="OB3" th:selected="${param.statusId == 'OB3'}">해결</option>
							<option value="OB4" th:selected="${param.statusId == 'OB4'}">반려</option>
							<option value="OB5" th:selected="${param.statusId == 'OB5'}">완료</option>
						</select>
					</div>

					<!-- 우선순위 -->
					<div class="col-12 col-md-2">
						<label class="form-label">우선순위</label> <select id="filterPriority"
							name="priority" class="form-select">
							<option value=""
								th:selected="${param.priority == null or param.priority == ''}">전체</option>
							<option value="OA1" th:selected="${param.priority == 'OA1'}">긴급</option>
							<option value="OA2" th:selected="${param.priority == 'OA2'}">높음</option>
							<option value="OA3" th:selected="${param.priority == 'OA3'}">보통</option>
							<option value="OA4" th:selected="${param.priority == 'OA4'}">낮음</option>
						</select>
					</div>

					<!-- 담당자 -->
					<div class="col-12 col-md-3">
						<label class="form-label">담당자</label>
						<div class="input-group">
							<input type="text" id="filterAssigneeText" class="form-control"
								placeholder="담당자 선택" readonly th:value="${assigneeName}" /> <input
								type="hidden" id="filterAssigneeValue" name="assigneeCode"
								th:value="${param.assigneeCode}" />
							<button type="button" class="btn btn-secondary"
								id="btnOpenAssigneeModal">선택</button>
						</div>
					</div>

					<!-- 등록자 -->
					<div class="col-12 col-md-3">
						<label class="form-label">등록자</label>
						<div class="input-group">
							<input type="text" id="filterCreatorText" class="form-control"
								placeholder="등록자 선택" readonly th:value="${creatorName}" /> <input
								type="hidden" id="filterCreatorValue" name="createdByCode"
								th:value="${param.createdByCode}" />
							<button type="button" class="btn btn-secondary"
								id="btnOpenCreatorModal">선택</button>
						</div>
					</div>

					<!-- 등록일 -->
					<!-- <div class="col-12 col-md-3">
						<label class="form-label">등록일</label> <input type="date"
							id="filterCreatedAt" name="createdAt" class="form-control"
							th:value="${param.createdAt}" />
					</div> -->

					<!-- 마감기한 -->
					<div class="col-12 col-md-2">
						<label class="form-label">마감기한</label> <input type="date"
							id="filterDueAt" name="dueAt" class="form-control"
							th:value="${param.dueAt}" />
					</div>
				</div>

				<div class="d-flex justify-content-between align-items-center mt-3">
					<div class="d-flex gap-2">
						<button type="button" class="btn btn-success" id="btnIssueCreate">
							<i class="fas fa-plus me-1"></i>일감등록
						</button>
					</div>

					<div class="d-flex gap-2">
						<button type="button" class="btn btn-secondary"
							id="btnResetFilters">
							<i class="fas fa-redo me-1"></i>초기화
						</button>

						<button type="submit" class="btn btn-primary" id="btnApplyFilters">
							<i class="fa-solid fa-magnifying-glass me-1"></i>조회
						</button>
					</div>
				</div>
			</div>
		</div>
	</form>

	<div class="modal fade" id="projectSelectModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">프로젝트 선택</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<input type="text" id="projectModalSearch"
						class="form-control mb-2" placeholder="프로젝트명 검색" />
					<div class="list-group" id="projectModalList"></div>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="typeSelectModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">유형 선택</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body">
					<input type="text" id="typeModalSearch" class="form-control mb-2"
						placeholder="유형명 검색" />
					<div id="typeModalTree"
						class="type-tree list-group list-group-flush"></div>
					<!-- 여기가 트리 렌더링 영역 -->
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="assigneeSelectModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">담당자 선택</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<input type="text" id="assigneeModalSearch"
						class="form-control mb-2" placeholder="담당자명 검색" />
					<div class="type-tree list-group list-group-flush"
						id="assigneeModalTree"></div>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="creatorSelectModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-scrollable">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">등록자 선택</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>
				<div class="modal-body">
					<input type="text" id="creatorModalSearch"
						class="form-control mb-2" placeholder="등록자명 검색" />
					<div class="type-tree list-group list-group-flush"
						id="creatorModalTree"></div>
				</div>
			</div>
		</div>
	</div>
</div>
