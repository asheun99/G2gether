<!-- list.html -->
<!doctype html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}"
	layout:fragment="Content">

<head>
<meta charset="UTF-8" />
<title>일정 관리</title>
<link rel="stylesheet" th:href="@{/css/dhtmlx/dhtmlxgantt.css}" />
<link rel="stylesheet" th:href="@{/css/gantt/style.css}" />
<link rel="stylesheet" th:href="@{/css/gantt/search.css}" />
<link rel="stylesheet" th:href="@{/css/gantt/searchDuration.css}" />
</head>

<body>
	<div class="d-flex flex-column h-100 overflow-auto">
		<div class="x-page-title">
			<h3 class="page-title">일정 관리</h3>
			<div class="page-title-sub">일정 관리 페이지입니다.</div>
		</div>
		<!-- 검색조건 -->
		<div
			th:replace="~{gantt/search :: searchCondition(view='gantt/list')}"></div>

		<!-- 검색조건 -->
		<div th:replace="~{gantt/searchDuration :: searchDuration}"></div>

		<!-- 빈 상태 UI -->
		<div id="ganttEmptyState"
			style="display: none; flex-direction: column; align-items: center; justify-content: center; height: 300px; color: #9ca3af;">
			<div style="font-size: 48px; margin-bottom: 12px;">📋</div>
			<div
				style="font-size: 16px; font-weight: 600; margin-bottom: 6px; color: #6b7280;">표시할
				일정이 없습니다</div>
			<div style="font-size: 13px;">검색 조건을 변경하거나 일정을 등록해보세요.</div>
		</div>

		<!-- 로딩 스피너 -->
		<div id="ganttLoadingSpinner"
			class="d-flex justify-content-center align-items-center"
			style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.7); z-index: 1000;">
			<div class="spinner-border text-primary" role="status"
				style="width: 3rem; height: 3rem;">
				<span class="visually-hidden">Loading...</span>
			</div>
		</div>

		<!-- 간트차트 -->
		<div id="e7eGantt" class="gantt-wrapper"></div>

		<div class="gantt-navigation">
			<button type="button" class="btn btn-outline-secondary"
				id="btnGanttPrev">
				<i class="fas fa-chevron-left me-1"></i>이전
			</button>
			<button type="button" class="btn btn-outline-secondary"
				id="btnGanttNext">
				다음<i class="fas fa-chevron-right ms-1"></i>
			</button>

			<div class="gantt-export-btns">
				<button onclick="exportExcel()" class="export-btn excel-btn">📊
					Excel</button>
				<button onclick="exportPDF()" class="export-btn pdf-btn">📄
					PDF</button>
			</div>
		</div>
	</div>

	<script th:inline="javascript">
    	window.currentProject = [[${session.currentProject}]];
    	console.log(currentProject);
	</script>
	<script th:src="@{/js/dhtmlx/dhtmlxgantt.js}"></script>
	<script src="https://export.dhtmlx.com/gantt/api.js"></script>
	<script
		src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
	<script th:src="@{/js/gantt/list.js}"></script>
	<script th:src="@{/js/gantt/search.js}"></script>
	<script th:src="@{/js/gantt/searchDuration.js}"></script>
</body>

</html>
