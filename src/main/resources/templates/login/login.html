<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<th:block th:replace="~{common/configs/default_configs :: BootStrap}"></th:block>
<title>Login</title>
</head>
<body class="sb-nav-fixed d-flex flex-column min-vh-100">
	<div id="layoutAuthentication_content" class="flex-grow-1">
		<main class="d-flex align-items-center justify-content-center h-100">
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-lg-5">
						<div class="card shadow-lg border-0 rounded-lg">
							<div class="card-header">
								<h3 class="text-center font-weight-light my-4">Login</h3>
							</div>
							<div class="card-body">
								<form th:action="@{/login}" method="post">
									<div class="form-floating mb-3">
										<input class="form-control" id="empNo" name="employeeNo"
											type="text" inputmode="numeric" pattern="[0-9]*"
											placeholder="사원번호" th:value="${savedEmpNo}"
											oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
										<label for="empNo">사원번호</label>
									</div>
									<div class="form-floating mb-3">
										<input class="form-control" id="empPw" name="password"
											type="password" placeholder="비밀번호" /> <label for="empPw">비밀번호</label>
									</div>
									<div
										class="mb-3 d-flex justify-content-between align-items-center">

										<!-- 왼쪽 체크박스 묶음 -->
										<div class="d-flex align-items-center gap-4">

											<!-- 사원번호 기억 -->
											<div class="d-flex align-items-center">
												<input class="form-check-input me-2" id="inputRememberEmpNo"
													name="rememberEmpNo" type="checkbox"
													th:checked="${savedEmpNo != null and #strings.length(savedEmpNo) > 0}" />
												<label class="form-check-label mb-0"
													for="inputRememberEmpNo">사원번호 기억</label>
											</div>

											<!-- 자동로그인 -->
											<div class="d-flex align-items-center">
												<input class="form-check-input me-2" id="inputAutoLogin"
													name="autoLogin" type="checkbox" /> <label
													class="form-check-label mb-0" for="inputAutoLogin">자동로그인</label>
											</div>

										</div>

										<!-- 오른쪽 비밀번호 찾기 -->
										<a class="small" th:href="@{/findPw}">비밀번호 찾기</a>
									</div>



									<div
										class="d-flex align-items-center justify-content-center mt-4 mb-0">

										<button type="submit" class="btn btn-primary">로그인</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>

	<!-- 로그인 실패 모달 -->
	<div class="modal fade" id="loginFailModal" tabindex="-1"
		aria-labelledby="loginFailModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title" id="loginFailModalLabel">로그인 실패</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>

				<div class="modal-body text-center">
					<p th:text="${loginErrorMsg}">사원번호 또는 비밀번호가 틀렸습니다.</p>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-primary"
						data-bs-dismiss="modal">확인</button>
				</div>

			</div>
		</div>
	</div>

	<!-- 계정 잠김 모달 -->
	<div class="modal fade" id="loginLockedModal" tabindex="-1"
		aria-labelledby="loginLockedModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title" id="loginLockedModalLabel">계정 잠김</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>

				<div class="modal-body text-center">
					<p th:text="${loginLockedMsg}">해당 계정은 잠금 상태입니다. 관리자에게 문의하세요.</p>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-primary"
						data-bs-dismiss="modal">확인</button>
				</div>

			</div>
		</div>
	</div>

	<footer class="py-4 bg-light mt-auto"
		th:insert="~{common/fragments/default_footer :: DefaultFooter}"></footer>
	<th:block
		th:replace="~{common/configs/default_configs :: BottomScript}"></th:block>

	<script
		th:if="${loginErrorMsg != null and #strings.length(#strings.trim(loginErrorMsg)) > 0}">
		document.addEventListener("DOMContentLoaded", function() {
			const modal = new bootstrap.Modal(document
					.getElementById('loginFailModal'));
			modal.show();
		});
	</script>

	<script
		th:if="${loginLockedMsg != null and #strings.length(#strings.trim(loginLockedMsg)) > 0}">
		document.addEventListener("DOMContentLoaded", function() {
			const modal = new bootstrap.Modal(document
					.getElementById('loginLockedModal'));
			modal.show();
		});
	</script>
</body>
</html>
