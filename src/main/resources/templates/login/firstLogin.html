<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<th:block th:replace="~{common/configs/default_configs :: BootStrap}"></th:block>
<title>firstLogin</title>
</head>
<body class="sb-nav-fixed d-flex flex-column min-vh-100">
	<div id="layoutAuthentication_content" class="flex-grow-1">
		<main
			class="d-flex align-items-center justify-content-center h-100 py-5">
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-lg-6 col-md-8">
						<div class="card shadow-lg border-0 rounded-lg">
							<div class="card-header">
								<h3 class="text-center font-weight-light my-4">필수정보 입력</h3>
							</div>

							<div class="card-body">
								<!-- 플래시 메시지 -->
								<div class="alert alert-danger py-2" th:if="${msg != null}"
									th:text="${msg}"></div>

								<form th:action="@{/firstLogin}" method="post"
									id="firstLoginForm" novalidate>

									<!-- 새 비밀번호 -->
									<div class="form-floating mb-3">
										<input class="form-control" id="password" name="password"
											type="password" placeholder="새 비밀번호" required /> <label
											for="password">새 비밀번호</label>
										<div class="invalid-feedback">새 비밀번호를 입력하세요.</div>
									</div>

									<!-- 새 비밀번호 확인 (VO에는 없으니 name 없이) -->
									<div class="form-floating mb-3">
										<input class="form-control" id="passwordConfirm" name="passwordConfirm"
											type="password" placeholder="새 비밀번호 확인" required /> <label
											for="passwordConfirm">새 비밀번호 확인</label>
										<div class="invalid-feedback">비밀번호 확인을 입력하세요.</div>
									</div>

									<!-- 이메일 -->
									<div class="form-floating mb-3">
										<input class="form-control" id="email" name="email"
											type="email" placeholder="이메일" required /> <label
											for="email">이메일</label>
										<div class="invalid-feedback">이메일을 입력하세요.</div>
									</div>

									<!-- 전화번호 -->
									<div class="form-floating mb-4">
										<input class="form-control" id="phone" name="phone"
											type="text" placeholder="전화번호" maxlength="13" required /> <label
											for="phone">전화번호</label>
										<div class="invalid-feedback">전화번호를 입력하세요.</div>
									</div>

									<div class="d-flex align-items-center justify-content-center">
										<button class="btn btn-primary" type="submit" id="submitBtn">
											저장</button>
									</div>
								</form>
							</div>

							<div class="card-footer text-center py-3">
								<div class="small text-muted">첫 로그인 시 비밀번호 변경과 필수 정보 등록이 필요합니다.</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>

	<!-- 필수정보 입력 실패 모달 -->
	<div class="modal fade" id="requiredInfoFailModal" tabindex="-1"
		aria-labelledby="requiredInfoFailModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title" id="requiredInfoFailModalLabel">입력 오류</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>

				<div class="modal-body text-center">
					<p th:text="${requiredInfoErrorMsg}">필수정보 저장에 실패했습니다.</p>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-primary"
						data-bs-dismiss="modal">확인</button>
				</div>

			</div>
		</div>
	</div>

	<footer class="py-4 bg-light mt-auto"
		th:insert="~{common/fragments/default_footer :: DefaultFooter}"></footer>
	<th:block
		th:replace="~{common/configs/default_configs :: BottomScript}"></th:block>

	<script
		th:if="${requiredInfoErrorMsg != null and #strings.length(#strings.trim(requiredInfoErrorMsg)) > 0}">
		document.addEventListener("DOMContentLoaded", function() {
			const modal = new bootstrap.Modal(document
					.getElementById('requiredInfoFailModal'));
			modal.show();
		});
	</script>

	<script>
	// 전화번호 자동 하이픈
		document.addEventListener("DOMContentLoaded", function() {
			const phoneInput = document.getElementById("phone");

			phoneInput.addEventListener("input",
					function() {
						let value = phoneInput.value.replace(/[^0-9]/g, ""); // 숫자만 남기기

						if (value.length <= 3) {
							phoneInput.value = value;
						} else if (value.length <= 7) {
							phoneInput.value = value.slice(0, 3) + "-"
									+ value.slice(3);
						} else {
							phoneInput.value = value.slice(0, 3) + "-"
									+ value.slice(3, 7) + "-"
									+ value.slice(7, 11);
						}
					});
		});
	</script>

</body>
</html>
