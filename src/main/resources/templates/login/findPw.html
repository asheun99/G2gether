<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
<meta charset="UTF-8">
<th:block th:replace="~{common/configs/default_configs :: BootStrap}"></th:block>
<title>FindPw</title>
</head>
<body class="sb-nav-fixed d-flex flex-column min-vh-100">
	<div id="layoutAuthentication_content" class="flex-grow-1">
		<main class="d-flex align-items-center justify-content-center h-100">
			<div class="container">
				<div class="row justify-content-center">
					<div class="col-lg-5">
						<div class="card shadow-lg border-0 rounded-lg">
							<div class="card-header">
								<h3 class="text-center font-weight-light my-4">비밀번호 찾기</h3>
							</div>
							<div class="card-body">
								<form th:action="@{/findPw}" method="post">
									<div class="form-floating mb-3">
										<input class="form-control" id="empNo" name="employeeNo"
											type="text" inputmode="numeric" pattern="[0-9]*"
											placeholder="사원번호"
											oninput="this.value = this.value.replace(/[^0-9]/g, '')" />
										<label for="empNo">사원번호</label>
									</div>
									<div class="form-floating mb-3">
										<input class="form-control" id="name" name="name" type="text"
											placeholder="이름" /> <label for="name">이름</label>
									</div>
									<div class="form-floating mb-3">
										<input class="form-control" id="phone" name="phone"
											type="text" placeholder="전화번호" maxlength="13"
											oninput="formatPhone(this)" /> <label for="phone">전화번호</label>
									</div>

									<div class="mb-3 d-flex justify-content-end align-items-center">
										<a class="small" th:href="@{/login}">로그인으로</a>
									</div>

									<div
										class="d-flex align-items-center justify-content-center mt-4 mb-0">
										<button type="submit" class="btn btn-primary">인증메일 발송</button>
									</div>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>

	<!-- 비밀번호 찾기 실패 모달 -->
	<div class="modal fade" id="findPwFailModal" tabindex="-1"
		aria-labelledby="findPwFailModalLabel" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title" id="findPwFailModalLabel">비밀번호 찾기 실패</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"
						aria-label="Close"></button>
				</div>

				<div class="modal-body text-center">
					<p th:text="${findPwErrorMsg}">입력하신 정보가 올바르지 않습니다.</p>
				</div>

				<div class="modal-footer">
					<button type="button" class="btn btn-primary"
						data-bs-dismiss="modal">확인</button>
				</div>

			</div>
		</div>
	</div>

	<footer class="py-4 bg-light mt-auto"
		th:insert="~{common/fragments/default_footer :: DefaultFooter}"></footer>
	<th:block
		th:replace="~{common/configs/default_configs :: BottomScript}"></th:block>

	<script
		th:if="${findPwErrorMsg != null and #strings.length(#strings.trim(findPwErrorMsg)) > 0}">
		document.addEventListener("DOMContentLoaded", function() {
			const modal = new bootstrap.Modal(document
					.getElementById('findPwFailModal'));
			modal.show();
		});
	</script>

	<script>
		// 전화번호 입력 시 자동으로 하이픈(-)을 붙여주는 함수
		function formatPhone(input) {

			// 입력값에서 숫자만 남기고 전부 제거
			// (붙여넣기, 문자 입력 대비)
			let value = input.value.replace(/[^0-9]/g, '');

			// 길이가 3자리 이하일 경우
			// 아직 하이픈을 붙이지 않음
			if (value.length < 4) {
				input.value = value;

				// 4 ~ 7자리일 경우
				// 010-1234 형태
			} else if (value.length < 8) {
				input.value = value.replace(/(\d{3})(\d+)/, // 앞 3자리 + 나머지
				'$1-$2' // 010-1234
				);

				// 8자리 이상일 경우
				// 010-1234-5678 형태
			} else {
				input.value = value.replace(/(\d{3})(\d{3,4})(\d+)/, // 3자리 / 3~4자리 / 나머지
				'$1-$2-$3' // 010-1234-5678
				);
			}
		}
	</script>
</body>
</html>
