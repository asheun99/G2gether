<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>공지 수정</title>
    <link rel="stylesheet" th:href="@{/css/notice/notice-edit.css}" />
  </head>

  <body>
    <div class="x-page-title">
      <h3 class="page-title">공지 수정</h3>
      <div class="page-title-sub">프로젝트 공지를 수정할 수 있습니다.</div>
    </div>

    <div
      th:if="${errorMessage != null}"
      class="alert alert-danger mb-3"
      th:text="${errorMessage}"
    ></div>

    <div class="card notice-card mb-4">
      <div class="card-header">
        <div class="card-header-title">공지 수정</div>
      </div>

      <div class="card-body">
        <form
          id="noticeEditForm"
          th:action="@{/noticeEdit}"
          method="post"
          enctype="multipart/form-data"
        >
          <input
            type="hidden"
            name="noticeCode"
            id="noticeCode"
            th:value="${notice.noticeCode}"
          />
          <input
            type="hidden"
            name="projectCode"
            id="projectCode"
            th:value="${notice.projectCode}"
          />

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label">프로젝트</label>
              <div class="input-group">
                <input
                  type="text"
                  id="projectText"
                  class="form-control"
                  readonly
                  th:value="${projectName}"
                />
              </div>
              <div class="form-text">프로젝트는 수정할 수 없습니다.</div>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label"
                >공지 제목<span class="req">*</span></label
              >
              <input
                type="text"
                id="title"
                name="title"
                class="form-control"
                placeholder="제목 입력"
                maxlength="200"
                th:value="${notice.title}"
              />
              <div class="d-flex justify-content-between align-items-center">
                <div class="form-text">제목은 200자 이내로 입력해주세요.</div>
                <div class="text-muted small" id="titleCounter">0 / 200</div>
              </div>
              <div class="invalid-feedback" id="titleInvalidMsg"></div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <label class="form-label"
                >공지 내용<span class="req">*</span></label
              >
              <textarea
                id="content"
                name="content"
                class="form-control notice-textarea"
                rows="10"
                placeholder="내용 입력"
                th:text="${notice.content}"
              ></textarea>

              <div class="d-flex justify-content-between align-items-center">
                <div class="form-text">내용은 5000자 이내로 입력해주세요.</div>
                <div class="text-muted small" id="contentCounter">0 / 5000</div>
              </div>

              <div
                class="invalid-feedback d-block"
                id="contentInvalidMsg"
              ></div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-12 col-md-12">
              <label class="form-label">첨부파일</label>

              <!-- 기존 첨부 표시 -->
              <div class="mb-2" th:if="${notice.fileCode != null}">
                <div class="d-flex align-items-center gap-2">
                  <i class="fa-solid fa-paperclip"></i>

                  <!-- 다운로드 링크: FileController 쓰면 이게 제일 안전 -->
                  <a
                    th:href="@{/files/{fileCode}(fileCode=${notice.fileCode})}"
                    th:text="${notice.originalName != null ? notice.originalName : '첨부파일'}"
                    target="_blank"
                    rel="noopener"
                    >첨부파일</a
                  >

                  <span
                    class="text-muted small"
                    th:if="${notice.uploadedAt != null}"
                    th:text="${#temporals.format(notice.uploadedAt,'yyyy-MM-dd HH:mm')}"
                  ></span>
                  <div class="form-check mt-2">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="removeFile"
                      name="removeFile"
                      value="true"
                    />
                    <label class="form-check-label" for="removeFile"
                      >제거</label
                    >
                  </div>
                </div>

                <!-- 첨부 제거 -->
              </div>

              <!-- 새 파일 업로드 -->
              <input
                type="file"
                class="form-control"
                name="uploadFile"
                id="uploadFile"
              />

              <div class="form-text" th:if="${notice.fileCode != null}">
                새 파일을 선택하면 기존 파일이 교체됩니다.
              </div>
              <div class="form-text" th:if="${notice.fileCode == null}">
                파일을 선택해 첨부할 수 있습니다.
              </div>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-4">
            <button type="button" class="btn btn-secondary" id="btnBack">
              <i class="fas fa-arrow-left me-1"></i>돌아가기
            </button>

            <div class="d-flex gap-2">
              <button type="button" class="btn btn-secondary" id="btnReset">
                <i class="fas fa-redo me-1"></i>되돌리기
              </button>

              <button
                type="submit"
                class="btn btn-success"
                id="btnSave"
                th:attr="data-can-modify=${canModify}"
              >
                <i class="fas fa-save me-1"></i>공지 수정
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
    <script th:src="@{/js/notice/notice-edit.js}"></script>
  </body>
</html>
