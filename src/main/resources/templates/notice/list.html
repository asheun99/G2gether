<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>공지 목록</title>
    <link rel="stylesheet" th:href="@{/css/notice/notice-list.css}" />
  </head>

  <body>
    <div class="x-page-title">
      <h3 class="page-title">공지 목록</h3>
      <div class="page-title-sub">
        프로젝트별 공지 목록을 조회할 수 있습니다.
      </div>
    </div>

    <form id="noticeFilterForm" th:action="@{/noticeList}" method="get">
      <div class="notice-filters mb-3 mt-3">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-3">
            <label class="form-label">프로젝트</label>
            <div class="input-group">
              <input
                type="text"
                id="filterProjectText"
                class="form-control"
                placeholder="프로젝트 선택"
                readonly
                th:value="${projectName}"
              />
              <input
                type="hidden"
                id="filterProjectValue"
                name="projectCode"
                th:value="${projectCode}"
              />
              <button
                type="button"
                class="btn btn-secondary"
                id="btnOpenProjectModal"
              >
                선택
              </button>
            </div>
          </div>

          <div class="col-12 col-md-3">
            <label class="form-label">공지 제목</label>
            <input
              type="text"
              id="filterTitle"
              name="title"
              class="form-control"
              placeholder="공지 제목 입력"
              th:value="${param.title}"
            />
          </div>

          <div class="col-12 col-md-3">
            <label class="form-label">등록자</label>
            <div class="input-group">
              <input
                type="text"
                id="filterCreatorText"
                class="form-control"
                placeholder="등록자 선택"
                readonly
                th:value="${creatorName}"
              />
              <input
                type="hidden"
                id="filterCreatorValue"
                name="creatorCode"
                th:value="${param.creatorCode}"
              />
              <button
                type="button"
                class="btn btn-secondary"
                id="btnOpenCreatorModal"
              >
                선택
              </button>
            </div>
          </div>

          <div class="col-12 col-md-3">
            <label class="form-label">등록일</label>
            <input
              type="date"
              id="filterCreatedAt"
              name="createdAt"
              class="form-control"
              th:value="${param.createdAt}"
            />
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-success"
                id="btnNoticeCreate"
                th:if="${showCreateBtn}"
              >
                <i class="fas fa-plus me-1"></i>공지등록
              </button>
            </div>

            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-secondary"
                id="btnResetFilters"
              >
                <i class="fas fa-redo me-1"></i>초기화
              </button>

              <button
                type="submit"
                class="btn btn-primary"
                id="btnApplyFilters"
              >
                <i class="fa-solid fa-magnifying-glass"></i>조회
              </button>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="card mb-4">
      <div
        class="card-header d-flex align-items-center justify-content-between"
      >
        <div><i class="fas fa-table me-1"></i> 공지 목록</div>
        <div class="text-muted small" id="noticePageInfo"></div>
      </div>

      <div class="card-body">
        <div class="table-responsive">
          <table
            class="table table-hover align-middle text-center"
            id="noticeTable"
          >
            <thead class="table-light">
              <tr>
                <th style="width: 70px">번호</th>
                <th>프로젝트명</th>
                <th>공지명</th>
                <th>등록자</th>
                <th>등록일</th>
              </tr>
            </thead>

            <tbody id="noticeTbody">
              <tr
                class="noticeRow"
                th:each="notice : ${list}"
                th:attr="
                data-notice-code=${notice.noticeCode},
                  data-project=${notice.projectName},
                  data-project-code=${notice.projectCode},
                  data-title=${notice.title},
                  data-creator-code=${notice.userCode},
                  data-creator=${notice.creatorName},
                  data-created=${notice.createdAt != null ? #temporals.format(notice.createdAt,'yyyy-MM-dd') : ''}"
              >
                <td class="col-no"></td>
                <td th:text="${notice.projectName}" class="text-start"></td>
                <td th:text="${notice.title}" class="text-start"></td>
                <td>
                  <a
                    th:if="${notice.userCode != null}"
                    th:href="@{/users/{userCode}(userCode=${notice.userCode})}"
                    th:text="${notice.creatorName}"
                    class="user-link text-decoration-none"
                  ></a>
                  <span
                    th:if="${notice.userCode == null}"
                    th:text="${notice.creatorName != null ? notice.creatorName : ''}"
                  ></span>
                </td>
                <td
                  th:text="${notice.createdAt != null ? #temporals.format(notice.createdAt, 'yyyy-MM-dd') : ''}"
                ></td>
              </tr>
            </tbody>
          </table>
        </div>

        <nav class="d-flex justify-content-center mt-3 mb-3">
          <ul class="pagination mb-0" id="noticePagination"></ul>
        </nav>
      </div>
    </div>

    <div
      class="modal fade"
      id="projectSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">프로젝트 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="projectModalSearch"
              class="form-control mb-2"
              placeholder="프로젝트명 검색"
            />
            <div class="list-group" id="projectModalList"></div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="creatorSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">등록자 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="creatorModalSearch"
              class="form-control mb-2"
              placeholder="등록자명 검색"
            />
            <div id="creatorModalTree" class="type-tree"></div>
          </div>
        </div>
      </div>
    </div>

    <input type="hidden" name="projectName" id="filterProjectNameHidden" />
    <input type="hidden" name="creatorName" id="filterCreatorNameHidden" />

    <script th:inline="javascript">
      window.__CP__ = /*[[${session.currentProject}]]*/ null;
    </script>
    <script th:src="@{/js/notice/notice-list.js}"></script>
  </body>
</html>
