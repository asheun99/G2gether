<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}"
	layout:fragment="Content">
<head>
<meta charset="UTF-8">
<title>그룹 등록</title>
<link rel="stylesheet" th:href="@{/css/issue/issue-insert.css}">
<link rel="stylesheet" th:href="@{/css/project/project.css}">
<link rel="stylesheet" th:href="@{/css/groupmgr/group.css}">
</head>
<body>
	<div id="container">
		<div class="x-page-title">
			<h3 class="page-title">그룹 등록</h3>
			<div class="page-title-sub">그룹 등록 및 구성원, 프로젝트 매핑이 가능합니다.</div>
		</div>
		<form name="insertForm">
			<div class="issue-filters mb-3 mt-3">
				<div class="row g-3 align-items-start">
					<div class="col-md-12">
						<label class="form-label fw-bold">그룹명 <span
							class="text-danger">*</span></label> <input type="text" name="grName"
							class="form-control" placeholder="그룹명 입력 (2~50자)" maxlength="50"
							required> <small class="form-text text-muted">한글,
							영문, 숫자, 공백 사용 가능 (2~50자)</small>
					</div>
				</div>
			</div>
			<div class="mb-3">
				<label for="editor" class="form-label fw-bold">그룹 설명</label>
				<textarea name="description" id="editor" class="form-control"
					rows="4" placeholder="그룹에 대한 설명을 입력하세요. (최대 500자)" maxlength="500"></textarea>
				<small class="form-text text-muted">최대 500자</small>
			</div>

			<!-- 구성원 섹션 -->
			<div class="project-filters mb-2 mt-4">
				<div
					class="col-12 d-flex justify-content-between align-items-center">
					<label class="form-label mb-0 fw-bold">구성원 등록</label>
					<button type="button" class="btn btn-success py-1"
						id="btnAddMember">
						<i class="fas fa-plus me-1"></i>구성원 추가
					</button>
				</div>
			</div>
			<div class="card mt-1 mb-4">
				<div class="card-header">
					<i class="fas fa-users me-1"></i> 구성원 목록
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-hover align-middle">
							<thead class="table-light">
								<tr>
									<th>이름</th>
									<th>이메일</th>
									<th>삭제</th>
								</tr>
							</thead>
							<tbody id="memberTbody">
								<tr>
									<td colspan="3" class="text-center text-muted">추가된 구성원이
										없습니다.</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

			<!-- 프로젝트 섹션 -->
			<div class="project-filters mb-2 mt-4">
				<div
					class="col-12 d-flex justify-content-between align-items-center">
					<label class="form-label mb-0 fw-bold">프로젝트 매핑</label>
					<button type="button" class="btn btn-success py-1"
						id="btnAddProject">
						<i class="fas fa-plus me-1"></i>프로젝트 추가
					</button>
				</div>
			</div>
			<div class="card mt-1 mb-4">
				<div class="card-header">
					<i class="fas fa-diagram-project me-1"></i> 프로젝트 목록
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-hover align-middle">
							<thead class="table-light">
								<tr>
									<th>프로젝트명</th>
									<th>권한</th>
									<th>수정</th>
									<th>삭제</th>
								</tr>
							</thead>
							<tbody id="projectTbody">
								<tr>
									<td colspan="4" class="text-center text-muted">추가된 프로젝트가
										없습니다.</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>

			<div class="d-flex justify-content-between align-items-center mt-4">

				<button type="button" th:onclick="location.href=[[@{/groupmgrs}]]"
					class="btn btn-secondary">
					<i class="fas fa-arrow-left me-1"></i>목록으로
				</button>
				<div class="d-flex gap-2">
					<button type="button" class="btn btn-secondary" id="btnReset">
						<i class="fas fa-redo me-1"></i>초기화
					</button>
					<button type="button" class="btn btn-success" id="btnSubmit">
						<i class="fas fa-save me-1"></i>그룹 등록
					</button>
				</div>
			</div>
		</form>

		<!-- 구성원 선택 모달 -->
		<div class="modal fade" id="memberSelectModal" tabindex="-1"
			aria-hidden="true">
			<div class="modal-dialog modal-lg modal-dialog-scrollable">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">구성원 추가</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<input type="text" id="memberModalSearch"
							class="form-control mb-3" placeholder="구성원 검색">
						<div class="card mb-3">
							<div class="card-body p-0">
								<table class="table table-hover mb-0">
									<thead class="table-light">
										<tr>
											<th style="width: 60px;"><input type="checkbox"
												id="selectAllMembers" class="form-check-input"></th>
											<th>이름</th>
											<th>이메일</th>
										</tr>
									</thead>
									<tbody id="memberModalList"></tbody>
								</table>
							</div>
						</div>
						<button type="button" class="btn btn-success w-100"
							id="btnAddSelectedMembers">
							<i class="fas fa-plus me-1"></i>선택한 구성원 추가하기
						</button>
					</div>
				</div>
			</div>
		</div>

		<!-- 프로젝트 선택 모달 -->
		<div class="modal fade" id="projectSelectModal" tabindex="-1"
			aria-hidden="true">
			<div class="modal-dialog modal-lg modal-dialog-scrollable">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">프로젝트 추가</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body">
						<input type="text" id="projectModalSearch"
							class="form-control mb-3" placeholder="프로젝트 검색">
						<div class="card mb-3">
							<div class="card-body p-0">
								<table class="table table-hover mb-0">
									<thead class="table-light">
										<tr>
											<th style="width: 60px;"><input type="checkbox"
												id="selectAllProjects" class="form-check-input"></th>
											<th>프로젝트명</th>
									
										</tr>
									</thead>
									<tbody id="projectModalList"></tbody>
								</table>
							</div>
						</div>
						<div class="mb-3 border-top pt-3">
							<label class="fw-bold mb-2">역할 선택 <span
								class="text-danger">*</span></label>
							<div id="projectRoleList"
								class="d-flex flex-wrap gap-3 p-2 bg-light rounded"></div>
						</div>
						<button type="button" class="btn btn-success w-100"
							id="btnAddSelectedProjects">
							<i class="fas fa-plus me-1"></i>선택한 프로젝트 추가하기
						</button>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script th:src="@{/js/common/toast.js}"></script>
	<script th:inline="javascript">
		/*<![CDATA[*/
		window.serverData = {
			users : /*[[${users}]]*/[],
			roles : /*[[${roles}]]*/[],
			projects : /*[[${projects}]]*/[]
		};
		/*]]>*/
	</script>
	<script th:src="@{/js/groupmgr/groupadd.js}"></script>
</body>
</html>
