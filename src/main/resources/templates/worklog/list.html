<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>소요시간 목록</title>
    <link rel="stylesheet" th:href="@{/css/worklog/worklog-list.css}" />
  </head>

  <body>
    <div class="x-page-title">
      <h3 class="page-title">소요시간 목록</h3>
      <div class="page-title-sub">
        프로젝트별 소요시간을 조회하고 관리할 수 있습니다.
      </div>
    </div>

    <form id="worklogFilterForm" th:action="@{/worklogList}" method="get">
      <div class="issue-filters mb-3 mt-3">
        <div class="row g-2 align-items-end">
          <!-- 프로젝트 -->
          <div class="col-12 col-md-3">
            <label class="form-label">프로젝트</label>
            <div class="input-group">
              <input
                type="text"
                id="filterProjectText"
                class="form-control"
                placeholder="프로젝트 선택"
                readonly
                th:value="${projectName}"
              />
              <input
                type="hidden"
                id="filterProjectValue"
                name="projectCode"
                th:value="${projectCode}"
              />
              <button
                type="button"
                class="btn btn-secondary"
                id="btnOpenProjectModal"
              >
                선택
              </button>
            </div>
          </div>

          <!-- 유형 -->
          <div class="col-12 col-md-3">
            <label class="form-label">유형</label>
            <div class="input-group">
              <input
                type="text"
                id="filterTypeText"
                class="form-control"
                placeholder="유형 선택"
                readonly
                th:value="${typeLabel}"
              />
              <input
                type="hidden"
                id="filterTypeValue"
                name="typeCode"
                th:value="${param.typeCode}"
              />
              <button
                type="button"
                class="btn btn-secondary"
                id="btnOpenTypeModal"
              >
                선택
              </button>
            </div>
          </div>

          <!-- 일감명 -->
          <div class="col-12 col-md-3">
            <label class="form-label">일감</label>
            <input
              type="text"
              id="filterIssueTitle"
              name="issueTitle"
              class="form-control"
              placeholder="일감명 입력"
              th:value="${param.issueTitle}"
            />
          </div>

          <!-- 작업자 -->
          <div class="col-12 col-md-3">
            <label class="form-label">작업자</label>
            <div class="input-group">
              <input
                type="text"
                id="filterWorkerText"
                class="form-control"
                placeholder="작업자 선택"
                readonly
                th:value="${workerName}"
              />
              <input
                type="hidden"
                id="filterWorkerValue"
                name="workerCode"
                th:value="${param.workerCode}"
              />
              <button
                type="button"
                class="btn btn-secondary"
                id="btnOpenWorkerModal"
              >
                선택
              </button>
            </div>
          </div>
        </div>

        <div class="row g-2 mt-1">
          <!-- 작업일 -->
          <div class="col-12 col-md-3">
            <label class="form-label">작업일</label>
            <input
              type="date"
              id="filterWorkDate"
              name="workDate"
              class="form-control"
              th:value="${param.workDate}"
            />
          </div>

          <!-- 시간 -->
          <div class="col-12 col-md-3">
            <label class="form-label">소요시간(시/분) 이상</label>
            <div class="d-flex gap-2">
              <input
                type="number"
                id="filterWorkHour"
                class="form-control"
                placeholder="시"
                min="0"
                max="999"
                inputmode="numeric"
              />
              <input
                type="number"
                id="filterWorkMinute"
                class="form-control"
                placeholder="분"
                min="0"
                max="59"
                inputmode="numeric"
              />
            </div>

            <input
              type="hidden"
              id="filterWorkTime"
              name="workTime"
              th:value="${param.workTime}"
            />
          </div>

          <div
            class="col-12 col-md-12 d-flex justify-content-between align-items-center mt-2"
          >
            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-success"
                id="btnOpenWorklogInsert"
              >
                <i class="fa-solid fa-plus"></i>소요시간 등록
              </button>
            </div>

            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-secondary"
                id="btnResetFilters"
              >
                <i class="fas fa-redo me-1"></i>초기화
              </button>

              <button
                type="submit"
                class="btn btn-primary"
                id="btnApplyFilters"
              >
                <i class="fa-solid fa-magnifying-glass"></i>조회
              </button>
            </div>
          </div>
        </div>
      </div>
    </form>

    <!-- 목록 테이블 -->
    <div class="card mb-4 worklog-list-card">
      <div
        class="card-header d-flex align-items-center justify-content-between"
      >
        <div class="d-flex align-items-center gap-3">
          <i class="fas fa-table"></i>

          <ul
            class="nav nav-tabs nav-tabs-sm mb-0"
            id="worklogTabs"
            role="tablist"
          >
            <li class="nav-item" role="presentation">
              <a
                class="nav-link active"
                id="tab-worklog-list"
                th:href="@{/worklogs}"
                role="tab"
                aria-selected="true"
                >목록</a
              >
            </li>

            <li class="nav-item" role="presentation">
              <a
                class="nav-link"
                id="tab-worklog-stats"
                th:href="@{/worklogStats}"
                role="tab"
                aria-selected="false"
                >통계</a
              >
            </li>
          </ul>
        </div>

        <div class="text-muted small" id="worklogPageInfo"></div>
      </div>

      <div class="card-body">
        <div class="table-responsive">
          <table
            class="table table-hover align-middle text-center"
            id="worklogTable"
          >
            <thead class="table-light">
              <tr>
                <th style="width: 70px">번호</th>
                <th>프로젝트</th>
                <th>유형</th>
                <th>일감</th>
                <th>내용</th>
                <th style="width: 140px">작업자</th>
                <th style="width: 130px">작업일</th>
                <th style="width: 110px">시간(분)</th>
                <th style="width: 56px"></th>
              </tr>
            </thead>

            <tbody id="worklogTbody">
              <tr th:if="${list == null or #lists.isEmpty(list)}">
                <td colspan="9" class="text-muted">데이터가 없습니다.</td>
              </tr>

              <tr
                class="worklogRow"
                th:each="row : ${list}"
                th:attr="
                  data-worklog-code=${row['workLogCode']},
                  data-issue-code=${row['issueCode']},
                  data-project-code=${row['projectCode']},
                  data-project-name=${row['projectName']},
                  data-project-status=${row['projectStatus']},
                  data-worker-code=${row['workerCode']},
                  data-worker-name=${row['workerName']},
                  data-type-code=${row['typeCode']},
                  data-type-name=${row['typeName']},
                  data-issue-title=${row['issueTitle']},
                  data-description=${row['description']},
                  data-work-date=${row['workDate']},
                  data-spent-minutes=${row['spentMinutes']},
                  data-login-user-code=${session.user != null ? session.user.userCode : ''}"
              >
                <td class="col-no"></td>
                <td th:text="${row['projectName']}" class="text-start"></td>
                <td
                  th:text="${row['typeName'] != null ? row['typeName'] : '-'}"
                ></td>
                <td>
                  <a
                    th:if="${row['issueCode'] != null}"
                    th:href="@{/issueInfo(issueCode=${row['issueCode']})}"
                    th:text="${row['issueTitle']}"
                    class="badge rounded-pill text-bg-light border text-decoration-none px-3 py-2"
                    style="
                      font-size: 12px;
                      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
                      max-width: 320px;
                      display: inline-block;
                      overflow: hidden;
                      text-overflow: ellipsis;
                      white-space: nowrap;
                    "
                  ></a>

                  <span
                    th:if="${row['issueCode'] == null}"
                    th:text="${row['issueTitle']}"
                  ></span>
                </td>
                <td
                  th:text="${row['description'] != null ? row['description'] : '-'}"
                  class="text-start"
                ></td>
                <td>
                  <a
                    th:if="${row['workerCode'] != null}"
                    th:href="@{/users/{userCode}(userCode=${row['workerCode']})}"
                    th:text="${row['workerName']}"
                    class="user-link text-decoration-none"
                  ></a>

                  <span
                    th:if="${row['workerCode'] == null}"
                    th:text="${row['workerName'] != null ? row['workerName'] : ''}"
                  ></span>
                </td>
                <td
                  th:text="${row['workDate'] != null ? row['workDate'] : ''}"
                ></td>
                <td
                  th:text="${row['spentMinutes'] != null ? row['spentMinutes'] : 0}"
                ></td>

                <!-- 컨텍스트 메뉴 -->
                <td class="text-end pe-2 worklog-actions">
                  <div class="dropdown worklog-dropdown">
                    <button
                      type="button"
                      class="btn btn-sm btn-light worklog-menu-btn"
                      data-bs-toggle="dropdown"
                      data-bs-auto-close="outside"
                      aria-expanded="false"
                      aria-label="소요시간 메뉴"
                    >
                      <i class="fa-solid fa-ellipsis-vertical"></i>
                    </button>

                    <ul
                      class="dropdown-menu dropdown-menu-end worklog-dropdown-menu"
                    >
                      <li>
                        <button
                          type="button"
                          class="dropdown-item"
                          data-action="edit"
                        >
                          수정
                        </button>
                      </li>
                      <li><hr class="dropdown-divider" /></li>
                      <li>
                        <button
                          type="button"
                          class="dropdown-item text-danger"
                          data-action="delete"
                        >
                          삭제
                        </button>
                      </li>
                    </ul>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <nav class="d-flex justify-content-center mt-3 mb-3">
          <ul class="pagination mb-0" id="worklogPagination"></ul>
        </nav>
      </div>
    </div>

    <!-- 프로젝트 선택 모달 -->
    <div
      class="modal fade"
      id="projectSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">프로젝트 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="projectModalSearch"
              class="form-control mb-2"
              placeholder="프로젝트명 검색"
            />
            <div class="list-group" id="projectModalList"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 유형 선택 모달 -->
    <div
      class="modal fade"
      id="typeSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">유형 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="typeModalSearch"
              class="form-control mb-2"
              placeholder="유형명 검색"
            />
            <div id="typeModalTree" class="type-tree"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 작업자 선택 모달 -->
    <div
      class="modal fade"
      id="workerSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">작업자 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="workerModalSearch"
              class="form-control mb-2"
              placeholder="작업자명 검색"
            />
            <div id="workerModalTree" class="type-tree"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 일감 선택 모달 (등록/수정 공용) -->
    <div
      class="modal fade"
      id="issueSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">일감 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="issueModalSearch"
              class="form-control mb-2"
              placeholder="일감명 검색"
            />
            <div id="issueModalTree" class="type-tree"></div>
          </div>
        </div>
      </div>
    </div>

    <input
      type="hidden"
      id="loginUserCode"
      th:value="${session.user.userCode}"
    />
    <input type="hidden" id="loginUserName" th:value="${session.user.name}" />

    <!-- 소요시간 등록 모달 -->
    <div
      class="modal fade"
      id="worklogCreateModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">소요시간 등록</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form id="worklogCreateForm">
              <div class="mb-3">
                <label class="form-label"
                  >프로젝트<span class="req">*</span></label
                >
                <div class="input-group">
                  <input
                    type="text"
                    id="wlProjectText"
                    class="form-control"
                    placeholder="프로젝트 선택"
                    readonly
                  />
                  <input type="hidden" id="wlProjectCode" />
                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnPickProject"
                  >
                    선택
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">일감<span class="req">*</span></label>
                <div class="input-group">
                  <input
                    type="text"
                    id="wlIssueText"
                    class="form-control"
                    placeholder="일감 선택"
                    readonly
                  />
                  <input type="hidden" id="wlIssueCode" />
                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnPickIssue"
                  >
                    선택
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label"
                  >작업자<span class="req">*</span></label
                >
                <div class="input-group">
                  <input
                    type="text"
                    id="wlWorkerText"
                    class="form-control"
                    placeholder="작업자 선택"
                    readonly
                  />
                  <input type="hidden" id="wlWorkerCode" />
                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnPickWorker"
                  >
                    선택
                  </button>
                </div>
              </div>

              <div class="row g-2">
                <div class="col-12 col-md-6">
                  <label class="form-label"
                    >작업일<span class="req">*</span></label
                  >
                  <input type="date" id="wlWorkDate" class="form-control" />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label"
                    >시간(시/분)<span class="req">*</span></label
                  >
                  <div class="d-flex gap-2">
                    <input
                      type="number"
                      id="wlHour"
                      class="form-control"
                      placeholder="시"
                      min="0"
                      max="999"
                      inputmode="numeric"
                    />
                    <input
                      type="number"
                      id="wlMinute"
                      class="form-control"
                      placeholder="분"
                      min="0"
                      max="59"
                      inputmode="numeric"
                    />
                  </div>
                  <div class="form-text text-muted"></div>
                </div>
              </div>

              <div class="mt-3">
                <label class="form-label">설명</label>
                <textarea
                  id="wlDesc"
                  class="form-control"
                  rows="3"
                  placeholder="작업 내용(선택)"
                ></textarea>
              </div>
            </form>
          </div>

          <div class="modal-footer d-flex justify-content-between">
            <button
              type="button"
              class="btn btn-secondary"
              id="btnWlCancel"
              data-bs-dismiss="modal"
            >
              취소
            </button>

            <div class="d-flex gap-2">
              <button
                type="button"
                class="btn btn-primary"
                id="btnWlSaveContinue"
              >
                등록 후 계속
              </button>
              <button type="button" class="btn btn-success" id="btnWlSaveClose">
                등록 후 종료
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 소요시간 수정 모달 -->
    <div
      class="modal fade"
      id="worklogEditModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">소요시간 수정</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <form id="worklogEditForm">
              <input type="hidden" id="weWorklogCode" />

              <div class="mb-3">
                <label class="form-label"
                  >프로젝트<span class="req">*</span></label
                >
                <div class="input-group">
                  <input
                    type="text"
                    id="weProjectText"
                    class="form-control"
                    placeholder="프로젝트 선택"
                    readonly
                  />
                  <input type="hidden" id="weProjectCode" />
                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnEditPickProject"
                  >
                    선택
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">일감<span class="req">*</span></label>
                <div class="input-group">
                  <input
                    type="text"
                    id="weIssueText"
                    class="form-control"
                    placeholder="일감 선택"
                    readonly
                  />
                  <input type="hidden" id="weIssueCode" />
                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnEditPickIssue"
                  >
                    선택
                  </button>
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label"
                  >작업자<span class="req">*</span></label
                >
                <div class="input-group">
                  <input
                    type="text"
                    id="weWorkerText"
                    class="form-control"
                    placeholder="작업자 선택"
                    readonly
                  />
                  <input type="hidden" id="weWorkerCode" />
                  <button
                    type="button"
                    class="btn btn-secondary"
                    id="btnEditPickWorker"
                  >
                    선택
                  </button>
                </div>
              </div>

              <div class="row g-2">
                <div class="col-12 col-md-6">
                  <label class="form-label"
                    >작업일<span class="req">*</span></label
                  >
                  <input type="date" id="weWorkDate" class="form-control" />
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label"
                    >시간(시/분)<span class="req">*</span></label
                  >
                  <div class="d-flex gap-2">
                    <input
                      type="number"
                      id="weHour"
                      class="form-control"
                      placeholder="시"
                      min="0"
                      max="999"
                      inputmode="numeric"
                    />
                    <input
                      type="number"
                      id="weMinute"
                      class="form-control"
                      placeholder="분"
                      min="0"
                      max="59"
                      inputmode="numeric"
                    />
                  </div>
                </div>
              </div>

              <div class="mt-3">
                <label class="form-label">설명</label>
                <textarea
                  id="weDesc"
                  class="form-control"
                  rows="3"
                  placeholder="작업 내용(선택)"
                ></textarea>
              </div>
            </form>
          </div>

          <div class="modal-footer d-flex justify-content-between">
            <button
              type="button"
              class="btn btn-secondary"
              id="btnWeCancel"
              data-bs-dismiss="modal"
            >
              취소
            </button>

            <div class="d-flex gap-2">
              <button type="button" class="btn btn-success" id="btnWeSave">
                수정 저장
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      window.__CP__ = /*[[${session.currentProject}]]*/ null;
    </script>
    <script th:src="@{/js/worklog/worklog-list.js}"></script>
  </body>
</html>
