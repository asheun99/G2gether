<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>일감 등록</title>
    <link rel="stylesheet" th:href="@{/css/issue/issue-insert.css}" />
  </head>

  <body>
    <div class="x-page-title">
      <h3 class="page-title">일감 등록</h3>
      <div class="page-title-sub">프로젝트별 일감을 등록할 수 있습니다.</div>
    </div>

    <div class="card issue-card mb-4">
      <div class="card-header">
        <div class="card-header-title">일감 등록</div>
      </div>

      <div class="card-body">
        <input
          type="hidden"
          id="issueReturnUrl"
          th:value="${session.ISSUE_RETURN_URL}"
        />
        <form
          id="issueInsertForm"
          th:action="@{/issueInsert}"
          method="post"
          enctype="multipart/form-data"
        >
          <input type="hidden" name="createdAt" id="createdAt" />
          <input type="hidden" name="dueAt" id="dueAt" />
          <input
            type="hidden"
            name="afterAction"
            id="afterAction"
            value="close"
          />

          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label"
                >프로젝트<span class="req">*</span></label
              >
              <div class="input-group">
                <input
                  type="text"
                  id="projectText"
                  class="form-control"
                  placeholder="프로젝트 선택"
                  readonly
                />
                <input
                  type="hidden"
                  name="projectCode"
                  id="projectCode"
                  th:value="${projectCode}"
                />
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="btnOpenProjectModal"
                >
                  선택
                </button>
              </div>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">유형<span class="req">*</span></label>
              <div class="input-group">
                <input
                  type="text"
                  id="typeText"
                  class="form-control"
                  placeholder="유형 선택"
                  readonly
                />
                <input type="hidden" name="typeCode" id="typeCode" />
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="btnOpenTypeModal"
                >
                  선택
                </button>
              </div>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">상위일감</label>
              <div class="input-group">
                <input
                  type="text"
                  id="parIssueText"
                  class="form-control"
                  placeholder="상위일감 선택"
                  readonly
                />
                <input type="hidden" name="parIssueCode" id="parIssueCode" />
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="btnOpenParIssueModal"
                >
                  선택
                </button>
              </div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <label class="form-label">제목<span class="req">*</span></label>
              <input
                type="text"
                name="title"
                id="title"
                class="form-control"
                placeholder="제목 입력"
                maxlength="200"
                required
              />
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <label class="form-label">설명</label>
              <textarea
                name="description"
                id="editor"
                placeholder="설명 입력"
                th:text="${issue.description}"
              ></textarea>
            </div>
          </div>

          <div class="row g-3 mt-1 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">상태<span class="req">*</span></label>
              <select
                name="statusId"
                id="statusCode"
                class="form-select"
                required
              >
                <option value="">선택</option>
                <option value="OB1">신규</option>
              </select>
              <div class="form-text">&nbsp;</div>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label"
                >우선순위<span class="req">*</span></label
              >
              <select
                name="priority"
                id="priority"
                class="form-select"
                required
              >
                <option value="">선택</option>
                <option value="OA1">긴급</option>
                <option value="OA2">높음</option>
                <option value="OA3">보통</option>
                <option value="OA4">낮음</option>
              </select>
              <div class="form-text priority-help">
                우선순위 선택 시 마감기한이 자동 설정됩니다.
              </div>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">담당자</label>
              <div class="input-group">
                <input
                  type="text"
                  id="assigneeText"
                  class="form-control"
                  placeholder="담당자 선택"
                  readonly
                />
                <input type="hidden" name="assigneeCode" id="assigneeCode" />
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="btnOpenAssigneeModal"
                >
                  선택
                </button>
              </div>
              <div class="form-text">&nbsp;</div>
            </div>
          </div>

          <div class="row g-3 mt-1 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">등록일</label>
              <input
                type="date"
                id="createdDateView"
                class="form-control"
                readonly
              />
              <div class="form-text">등록일은 오늘 날짜로 자동 설정됩니다.</div>
              <br />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">마감기한</label>
              <input type="date" id="dueDateView" class="form-control" />
              <div class="form-text">
                우선순위로 자동 설정되며 필요 시 수정할 수 있습니다.
                <br />
                <span class="text-muted">유형 기간: </span>
                <strong id="typeStartAtView" class="text-muted">-</strong>
                <span class="text-muted"> ~ </span>
                <strong id="typeEndAtView" class="text-muted">-</strong>
                <span class="text-muted"> 중 선택할 수 있습니다.</span>
              </div>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">진척도(0~100)</label>
              <input
                type="number"
                name="progress"
                id="progress"
                class="form-control"
                min="0"
                max="100"
                step="1"
                value="0"
              />
              <div class="form-text">&nbsp;<br />&nbsp;</div>
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-4">
            <button type="button" class="btn btn-secondary" id="btnBack">
              <i class="fas fa-arrow-left me-1"></i>돌아가기
            </button>

            <div class="d-flex gap-2">
              <button type="button" class="btn btn-secondary" id="btnReset">
                <i class="fas fa-redo me-1"></i>초기화
              </button>
              <button
                type="submit"
                class="btn btn-primary"
                id="btnWlSaveContinue"
                data-can-create="false"
              >
                등록 후 계속
              </button>
              <button
                type="submit"
                class="btn btn-success"
                id="btnWlSaveClose"
                data-can-create="false"
              >
                등록 후 종료
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div
      class="modal fade"
      id="projectSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">프로젝트 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="projectModalSearch"
              class="form-control mb-2"
              placeholder="프로젝트명 검색"
            />
            <div class="list-group" id="projectModalList"></div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="typeSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">유형 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="typeModalSearch"
              class="form-control mb-2"
              placeholder="유형명 검색"
            />
            <div id="typeModalTree" class="type-tree"></div>
            <!-- 여기가 트리 렌더링 영역 -->
          </div>
        </div>
      </div>
    </div>

    <!-- 상위일감 선택 모달 -->
    <div
      class="modal fade"
      id="parIssueSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">상위일감 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <input
              type="text"
              id="parIssueModalSearch"
              class="form-control mb-2"
              placeholder="일감명/담당자 검색"
            />

            <div id="parIssueModalTree" class="par-tree"></div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="assigneeSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">담당자 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body">
            <input
              type="text"
              id="assigneeModalSearch"
              class="form-control mb-2"
              placeholder="담당자명 검색"
            />
            <div id="assigneeModalTree" class="type-tree"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
    <script th:src="@{/js/ckeditor5.js}"></script>
    <script th:inline="javascript">
      window.__CP__ = /*[[${session.currentProject}]]*/ null;
    </script>
    <script th:src="@{/js/issue/issue-insert.js}"></script>
  </body>
</html>
