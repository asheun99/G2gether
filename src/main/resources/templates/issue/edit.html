<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default_layout}"
  layout:fragment="Content"
>
  <head>
    <meta charset="UTF-8" />
    <title>일감 수정</title>
    <link rel="stylesheet" th:href="@{/css/issue/issue-edit.css}" />
  </head>

  <body>
    <div class="x-page-title">
      <h3 class="page-title">일감 수정</h3>
      <div class="page-title-sub">일감을 수정할 수 있습니다.</div>
    </div>

    <div class="card issue-card mb-4">
      <div class="card-header">
        <div class="card-header-title">일감 수정</div>
      </div>

      <div class="card-body">
        <form
          id="issueEditForm"
          th:action="@{/issueEdit}"
          method="post"
          enctype="multipart/form-data"
        >
          <input
            type="hidden"
            name="issueCode"
            id="issueCode"
            th:value="${issue.issueCode}"
          />

          <input
            type="hidden"
            name="projectCode"
            id="projectCode"
            th:value="${issue.projectCode}"
          />

          <input type="hidden" name="createdAt" id="createdAt" />
          <input type="hidden" name="dueAt" id="dueAt" />
          <input type="hidden" name="startedAt" id="startedAt" />
          <input type="hidden" name="resolvedAt" id="resolvedAt" />

          <!-- 상위일감 코드(선택 시 name이 있어야 서버로 전달됨) -->
          <input
            type="hidden"
            id="parIssueCode"
            name="parIssueCode"
            th:value="${issue.parIssueCode}"
          />
          <!-- 유형 코드 -->
          <input
            type="hidden"
            id="typeCode"
            name="typeCode"
            th:value="${issue.typeCode}"
          />

          <div class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">프로젝트</label>
              <input
                type="text"
                id="projectText"
                class="form-control"
                readonly
                th:value="${issue.projectName}"
              />
              <div class="form-text">프로젝트는 변경할 수 없습니다.</div>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">유형<span class="req">*</span></label>
              <div class="input-group">
                <input
                  type="text"
                  id="typeText"
                  class="form-control"
                  placeholder="유형 선택"
                  readonly
                  th:value="${issue.typeName}"
                />
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="btnOpenTypeModal"
                >
                  선택
                </button>
              </div>
              <div class="form-text">&nbsp;</div>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">상위일감</label>
              <div class="input-group">
                <input
                  type="text"
                  id="parIssueText"
                  class="form-control"
                  placeholder="상위일감 선택"
                  readonly
                  th:value="${issue.parIssueTitle}"
                />
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="btnOpenParIssueModal"
                >
                  선택
                </button>
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  id="btnClearParIssue"
                >
                  해제
                </button>
              </div>
              <div class="form-text">
                상위일감을 선택하거나 해제할 수 있습니다.
              </div>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <label class="form-label">제목<span class="req">*</span></label>
              <input
                type="text"
                name="title"
                id="title"
                class="form-control"
                placeholder="제목 입력"
                maxlength="200"
                required
                th:value="${issue.title}"
              />
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-12">
              <label class="form-label">설명</label>
              <textarea
                name="description"
                id="editor"
                placeholder="설명 입력"
                th:text="${issue.description}"
              ></textarea>
            </div>
          </div>

          <!-- 상태 / 우선순위 / 담당자 -->
          <div class="row g-3 mt-1 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">상태<span class="req">*</span></label>
              <select
                name="statusId"
                id="statusId"
                class="form-select"
                required
              >
                <option value="">선택</option>

                <option
                  value="OB1"
                  th:if="${#lists.contains(allowedStatusIds, 'OB1')}"
                  th:selected="${issue.statusId == 'OB1'}"
                >
                  신규
                </option>

                <option
                  value="OB2"
                  th:if="${#lists.contains(allowedStatusIds, 'OB2')}"
                  th:selected="${issue.statusId == 'OB2'}"
                >
                  진행
                </option>

                <option
                  value="OB3"
                  th:if="${#lists.contains(allowedStatusIds, 'OB3')}"
                  th:selected="${issue.statusId == 'OB3'}"
                >
                  해결
                </option>

                <option
                  value="OB4"
                  th:if="${#lists.contains(allowedStatusIds, 'OB4')}"
                  th:selected="${issue.statusId == 'OB4'}"
                >
                  반려
                </option>

                <option
                  value="OB5"
                  th:if="${#lists.contains(allowedStatusIds, 'OB5')}"
                  th:selected="${issue.statusId == 'OB5'}"
                >
                  완료
                </option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label"
                >우선순위<span class="req">*</span></label
              >
              <select
                name="priority"
                id="priority"
                class="form-select"
                required
              >
                <option value="">선택</option>
                <option value="OA1" th:selected="${issue.priority == 'OA1'}">
                  긴급
                </option>
                <option value="OA2" th:selected="${issue.priority == 'OA2'}">
                  높음
                </option>
                <option value="OA3" th:selected="${issue.priority == 'OA3'}">
                  보통
                </option>
                <option value="OA4" th:selected="${issue.priority == 'OA4'}">
                  낮음
                </option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">담당자</label>
              <div class="input-group">
                <input
                  type="text"
                  id="assigneeText"
                  class="form-control"
                  placeholder="담당자 선택"
                  readonly
                  th:value="${issue.assigneeName}"
                />
                <input
                  type="hidden"
                  name="assigneeCode"
                  id="assigneeCode"
                  th:value="${issue.assigneeCode}"
                />
                <button
                  type="button"
                  class="btn btn-secondary"
                  id="btnOpenAssigneeModal"
                >
                  선택
                </button>
              </div>
            </div>
          </div>

          <div class="row g-3 mt-1 align-items-end">
            <div class="col-12 col-md-3">
              <label class="form-label">등록일</label>
              <input
                type="date"
                id="createdDateView"
                class="form-control"
                readonly
                th:value="${issue.createdAt != null ? #temporals.format(issue.createdAt,'yyyy-MM-dd') : ''}"
              />
              <div class="form-text">
                등록일은 변경할 수 없습니다.<br />&nbsp;
              </div>
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">마감기한</label>
              <input
                type="date"
                id="dueDateView"
                class="form-control"
                th:value="${issue.dueAt != null ? #temporals.format(issue.dueAt,'yyyy-MM-dd') : ''}"
              />
              <div class="form-text">
                우선순위 선택 시 자동 설정되며 필요 시 수정할 수 있습니다.
                <br />
                <span class="text-muted">유형 기간: </span>
                <strong id="typeStartAtView" class="text-muted">-</strong>
                <span class="text-muted"> ~ </span>
                <strong id="typeEndAtView" class="text-muted">-</strong>
                <span class="text-muted"> 중 선택할 수 있습니다.</span>
              </div>
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">시작일</label>
              <input
                type="date"
                id="startedDateView"
                class="form-control"
                th:value="${issue.startedAt != null ? #temporals.format(issue.startedAt,'yyyy-MM-dd') : ''}"
              />
              <div class="form-text">&nbsp;<br />&nbsp;</div>
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label">완료일</label>
              <input
                type="date"
                id="resolvedDateView"
                class="form-control"
                th:value="${issue.resolvedAt != null ? #temporals.format(issue.resolvedAt,'yyyy-MM-dd') : ''}"
              />
              <div class="form-text">&nbsp;<br />&nbsp;</div>
            </div>
          </div>

          <!-- 진척도 -->
          <div class="row g-3 mt-1 align-items-end">
            <div class="col-12 col-md-4">
              <label class="form-label">진척도(0~100)</label>
              <input
                type="number"
                name="progress"
                id="progress"
                class="form-control"
                min="0"
                max="100"
                step="1"
                th:value="${issue.progress}"
              />
              <div class="form-text">
                상태가 진행일 때 0 ~ 90 으로 선택 가능하고, 다른 상태에서는
                자동지정 됩니다.
              </div>
            </div>

            <div class="col-12 col-md-8">
              <label class="form-label">파일 등록</label>
              <input
                type="file"
                id="uploadFile"
                name="uploadFile"
                class="form-control"
              />
              <div class="form-text">&nbsp;</div>
            </div>
          </div>

          <!-- 버튼 -->
          <div class="d-flex justify-content-between align-items-center mt-4">
            <button type="button" class="btn btn-secondary" id="btnBack">
              <i class="fas fa-arrow-left me-1"></i>돌아가기
            </button>

            <div class="d-flex gap-2">
              <button type="button" class="btn btn-secondary" id="btnReset">
                <i class="fas fa-redo me-1"></i>초기화
              </button>
              <button type="submit" class="btn btn-success" id="btnSubmit">
                <i class="fas fa-save me-1"></i>수정 저장
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div
      class="modal fade"
      id="typeSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">유형 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="typeModalSearch"
              class="form-control mb-2"
              placeholder="유형명 검색"
            />
            <div id="typeModalTree" class="type-tree"></div>
            <!-- 트리 렌더링 영역 -->
          </div>
        </div>
      </div>
    </div>

    <!-- 상위일감 선택 모달 -->
    <div
      class="modal fade"
      id="parIssueSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">상위일감 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="parIssueModalSearch"
              class="form-control mb-2"
              placeholder="일감명/담당자 검색"
            />

            <!-- 변경: 테이블 제거 -> 트리 아코디언 렌더 영역 -->
            <div id="parIssueModalTree" class="par-tree"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 담당자 선택 모달 -->
    <div
      class="modal fade"
      id="assigneeSelectModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">담당자 선택</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="assigneeModalSearch"
              class="form-control mb-2"
              placeholder="담당자명 검색"
            />
            <div class="list-group" id="assigneeModalList"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.ckeditor.com/ckeditor5/41.0.0/classic/ckeditor.js"></script>
    <script th:src="@{/js/ckeditor5.js}"></script>
    <script th:src="@{/js/issue/issue-edit.js}"></script>
  </body>
</html>
