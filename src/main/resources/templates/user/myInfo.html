<!doctype html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}">
<head>
<meta charset="UTF-8" />
<title>내 정보</title>
<link rel="stylesheet" th:href="@{/css/user/my-info.css}" />
</head>

<body>
	<div layout:fragment="Content">

		<!-- 타이틀 영역 -->
		<div class="x-page-title">
			<h3 class="page-title">내 정보</h3>
			<div class="page-title-sub">내 정보를 확인하고 수정할 수 있습니다.</div>
		</div>

		<!-- 돌아가기 버튼 -->
		<div class="mb-3">
			<button type="button" class="btn btn-secondary" id="btnBackMyInfo">
				<i class="fas fa-arrow-left me-1"></i>돌아가기
			</button>
		</div>

		<!-- 알림 -->
		<div th:if="${msg != null}" id="myInfoServerAlert"
			class="alert alert-info py-2 mb-3" th:text="${msg}">메시지</div>

		<!-- 내 정보 수정 폼 -->
		<form id="myInfoForm" th:action="@{/myInfo}" method="post"
			class="myinfo-filters mb-3">

			<!-- 클라이언트 검증 안내 메시지 영역 -->
			<div id="myInfoAlert" class="alert alert-warning py-2 mb-3 d-none"
				role="alert"></div>

			<!-- 1줄: 사원번호/이름/직책 (읽기 전용) -->
			<div class="row g-2 align-items-end">
				<div class="col-12 col-md-4">
					<label class="form-label">사원번호</label> <input type="text"
						class="form-control" th:value="${user.employeeNo}" readonly />
				</div>

				<div class="col-12 col-md-4">
					<label class="form-label">이름</label> <input type="text"
						class="form-control" th:value="${user.name}" readonly />
				</div>

				<div class="col-12 col-md-4">
					<label class="form-label">직책</label> <input type="text"
						class="form-control" th:value="${user.position}" readonly />
				</div>
			</div>

			<!-- 2줄: 이메일/전화번호 (수정 가능) -->
			<div class="row g-2 align-items-end mt-1">
				<div class="col-12 col-md-6">
					<label class="form-label">이메일</label> <input type="email"
						id="email" name="email" class="form-control" placeholder="이메일 입력"
						th:value="${user.email}" required />
				</div>

				<div class="col-12 col-md-6">
					<label class="form-label">전화번호</label> <input type="text"
						id="phone" name="phone" class="form-control" placeholder="전화번호 입력"
						th:value="${user.phone}" required />
				</div>
			</div>

			<!-- 3줄: 등록날짜 + 버튼 -->
			<div class="row g-2 align-items-end mt-1">
				<div class="col-12 col-md-4">
					<label class="form-label">등록날짜</label> <input type="text"
						class="form-control"
						th:value="${user.createdAt != null ? #dates.format(user.createdAt,'yyyy-MM-dd') : '-'}"
						readonly />
				</div>

				<div class="col-12 col-md-8">
					<div class="d-flex justify-content-end gap-2 mt-3 mt-md-0">
						<a class="btn btn-outline-secondary" th:href="@{/myInfo/modifyPw}">
							비밀번호 변경 </a>
						<button type="submit" class="btn btn-success">저장</button>
					</div>
				</div>
			</div>

		</form>

		<!-- 내 프로젝트/그룹 정보 -->
		<div class="row g-3 mb-4">

			<!-- 내 프로젝트 -->
			<div class="col-12 col-lg-6">
				<div class="card myinfo-card-fixed">
					<div
						class="card-header d-flex align-items-center justify-content-between">
						<div>
							<i class="fas fa-briefcase me-1"></i> 내 프로젝트
						</div>
						<div class="text-muted small">내가 속한 프로젝트와 역할</div>
					</div>

					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-sm mb-0 align-middle myinfo-table">
								<thead class="table-light">
									<tr>
										<th style="width: 45%;">프로젝트</th>
										<th style="width: 20%;">상태</th>
										<th>역할</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${myProjects == null || #lists.isEmpty(myProjects)}">
										<td colspan="3" class="text-center text-muted py-3">소속
											프로젝트가 없습니다.</td>
									</tr>

									<tr th:each="p : ${myProjects}">
										<td class="td-left"><a
											th:href="@{/project/overview/{projectCode}(projectCode=${p.projectCode})}"
											th:text="${p.projectName}" class="project-link">프로젝트명</a></td>
										<td><span class="badge rounded-pill myinfo-status-badge"
											th:classappend="${p.status == 'OD3' ? ' text-bg-secondary' : ' text-bg-primary'}"
											th:text="${p.statusName != null ? p.statusName : '-'}">
												상태 </span></td>
										<td th:text="${p.roles != null ? p.roles : '-'}">역할</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>

				</div>
			</div>

			<!-- 내 그룹 -->
			<div class="col-12 col-lg-6">
				<div class="card myinfo-card-fixed">
					<div
						class="card-header d-flex align-items-center justify-content-between">
						<div>
							<i class="fas fa-users me-1"></i> 내 그룹
						</div>
						<div class="text-muted small">내가 속한 그룹 정보</div>
					</div>

					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-sm mb-0 align-middle myinfo-table">
								<thead class="table-light">
									<tr>
										<th style="width: 25%;">그룹</th>
										<th style="width: 35%;">인원수</th>
										<th>그룹 설명</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${myGroups == null || #lists.isEmpty(myGroups)}">
										<td colspan="3" class="text-center text-muted py-3">소속
											그룹이 없습니다.</td>
									</tr>

									<tr th:each="g : ${myGroups}">
										<td th:text="${g.groupName}">그룹명</td>
										<td th:text="${g.memberCount != null ? g.memberCount : 0}">0</td>
										<td class="td-left"
											th:text="${g.description != null ? g.description : '-'}">설명</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>

				</div>
			</div>

		</div>

	</div>
	<th:block layout:fragment="pageScript">
		<script th:src="@{/js/user/my-info.js}"></script>
	</th:block>
</body>
</html>
