<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default_layout}"
	layout:fragment="Content">

<head>
<meta charset="UTF-8">
<title>projects</title>
<link rel="stylesheet" th:href="@{/css/issue/issue-list.css}">
<link rel="stylesheet" th:href="@{/css/auth/auth.css}">

</head>
<body>
	<div id="container">
		<div class="x-page-title">
			<h3 class="page-title">역할 등록</h3>
			<div class="page-title-sub">신규 역할을 등록가능합니다.</div>
		</div>
		<div class="issue-filters mb-3 mt-3">
			<div class="row g-3 align-items-start mb-4">
				<div class="col-12 col-md-5">
					<div class="mb-2">
						<label class="form-label fw-bold">역할명</label><input type="text"
							id="roleName" class="form-control" placeholder="역할명 입력"
							maxlength="100">
						<div id="roleNameError" class="text-danger small mt-1"
							style="display: none;"></div>
						<small class="text-muted ms-auto"><span id="roleNameCount">0</span>/100</small>
					</div>
					<div>
						<label class="form-label fw-bold">설명</label>
						<textarea id="explanation" class="form-control" rows="2"
							placeholder="역할에 대한 설명을 입력하세요" maxlength="200"></textarea>
						<div id="explanationError" class="text-danger small mt-1"
							style="display: none;"></div>
						<small class="text-muted ms-auto"><span
							id="explanationCount">0</span>/200</small>
					</div>
				</div>

				<div class="col-12 col-md-3 d-flex align-items-center"
					style="padding-top: 32px;">
					<div class="form-check form-check-reverse">
						<label class="form-check-label fw-bold" for="adminCheck">
							마스터 </label> <input class="form-check-input" type="checkbox"
							id="adminCheck">
					</div>
				</div>



			</div>
			<div class="card mb-4 issue-list-card">

				<div
					class="card-header d-flex align-items-center justify-content-between">
					<div>
						<i class="fas fa-table me-1"></i> 권한

					</div>

					<div class="text-muted" id="projectPageInfo">
						전체선택 <input type="checkbox" class="all-check">
					</div>
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-hover align-middle" id="issueTable"
							style="table-layout: fixed; width: 100%;">
							<thead class="table-light">
								<tr>

									<th style="width: 100px;">권한</th>
									<th style="width: 80px;"><input id="readSelectAll"
										type="checkbox"> 읽기</th>
									<th style="width: 80px;"><input id="writeSelectAll"
										type="checkbox"> 등록</th>
									<th style="width: 80px;"><input id="modifySelectAll"
										type="checkbox"> 수정</th>
									<th style="width: 80px;"><input id="deleteSelectAll"
										type="checkbox"> 삭제</th>
								</tr>
							</thead>

							<tbody id="projectTbody">
								<tr class="projectRow" th:each="auth : ${auths}">
									<td><input type="checkbox" class="row-check"> [[
										${auth.category} ]]</td>
									<td><input type="checkbox" class="rd_rol"></td>
									<td><input type="checkbox" class="wr_rol"></td>
									<td><input type="checkbox" class="md_rol"></td>
									<td><input type="checkbox" class="del_rol"></td>
								</tr>
							</tbody>
						</table>
					</div>

					<!-- 페이징 -->
					<nav class="d-flex justify-content-center mt-3 mb-3">
						<ul class="pagination mb-0" id="projectPagination"></ul>
					</nav>
				</div>

			</div>
		</div>

		<div class="col-12  d-flex justify-content-between align-items-end"
			style="height: 100%;">
			<button type="button" th:onclick="|location.href='@{/auth}'|"
				class="btn btn-secondary">
				<i class="fas fa-arrow-left me-1"></i>돌아가기
			</button>
			<button type="button" class="btn btn-success" id="registerRoleBtn">
				<i class="fas fa-save me-1"></i> 권한 등록
			</button>

		</div>
		<script th:src="@{/js/common/toast.js}"></script>
		<script th:src="@{/js/auth/authadd.js}"></script>
</body>
</html>
